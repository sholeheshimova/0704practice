<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Netflix Card</title>
    <link rel="stylesheet" href="./styles/pages/home.css" />
  </head>
  <body>
    <main>
      <div class="container">
        <div class="netflix-title">
          <img src="./assets/images/netflix.svg" alt="" class="netflix-image" />
        </div>
        <div class="card">
          <div class="card-image">
            <img src="./assets/images/card-image.svg" alt="" />
          </div>
          <div class="card-form">
            <label for="email">Email:</label>
            <input
              type="email"
              id="email"
              required
              placeholder="Enter your email..."
            />
            <br />
            <label for="psw">Password:</label>
            <input type="password" id="psw" required />
            <button class="login-btn">Login</button>
          </div>

          <p class="card-paragraph">I'm not Henry</p>

          <div class="card-btns">
            <button class="login">Login as new user</button>
            <button class="sign">Sign Up</button>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
