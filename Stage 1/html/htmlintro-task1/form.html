<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <h1>Contact Us</h1>
<form >
    
    <label for="name">Full Name:</label>
    <input type="text" id="name" placeholder="Enter full name..">
    <br>
    <label for="email">Email Address:</label>
    <input type="email" id="email" placeholder="Enter adress.." required disabled value="email">
    <br>
    <label for="num">Phone Number:</label>
    <input type="tel" id="num" placeholder="Enter ur number..." required>
    <br>
    <label for="textarea">Your Message:</label>
    <textarea  id="textarea" cols="10"></textarea>
    <br>
    <label>Preferred Contact Method:</label>
    <input type="radio" name="contact">
    <label for="radio">Email</label>
    <input type="radio" name="contact">
    <label for="radio">Phone</label>

    <br>
    <input type="checkbox" name="check">
    <label>I agree to the <a href="./about.html">terms and conditions</a></label>
    <br>
    <input type="submit">
    <button>Submit</button>

</form>

</body>
</html>
