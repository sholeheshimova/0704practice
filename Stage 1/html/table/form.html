<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <form action="">
        <h1>Create a free account</h1>
        <h4>Account Details</h4>
        <label for="email">Email:</label>
        <input type="email"  id="email">
        <br>
        <label for="password">Password:</label>
        <input type="password"  id="password">
        <br>
        <label for="remail">Repeat Email:</label>
        <input type="email"  id="remail">
        <br>
        <label for="rps">Repeat password:</label>
        <input type="email"  id="rps">
        <br>

        <h4>Personal Details</h4>
         <label for="name">Name:</label>
        <input type="text"  id="name">
        <br>
        <label for="phone">Phone:</label>
        <input type="tel"  id="phone">
        <br>
        <label for="street">Street:</label>
        <input type="text"  id="street">
        <br>
        <label for="city">City:</label>
        <input type="text"  id="city">
        <br>
        <label for="country">Country:</label>
        <select  id="country">
            <option>Azerbaijan</option>
            <option>Turkey</option>
            <option>Russia</option>
        </select>
        <br>
         <label for="web">Website:</label>
         <input type="text"  id="web">
         <br>

         <label for="gender">Gender:</label>
         <br>
         <label >Male:</label>
         <input type="radio" id="gender">
         <label >Female</label>
         <input type="radio" id="gender">
         <br>
         <label for="birth">Birthdate:</label>
         <input type="date"  id="birth">
         <br>
         <label for="nation">Nationalty:</label>
        <select  id="nation">
            <option >Aze</option>
            <option >Tr</option>
            <option >Ru</option>
        </select>
        <br>

        <h4>Terms And Mailing</h4>

        <input type="checkbox" >
        <label>I accept  the <a href="./table.html">Privacy  for W3 school</a></label>;>
        <br>
        <input type="checkbox" >
        <label>I want to recieve personalize</label>
        <br>
        <input type="submit">

    </form>
</body>
</html>
